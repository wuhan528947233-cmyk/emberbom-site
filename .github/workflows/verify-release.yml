name: Verify public release integrity

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Match archives, checksum files, and displayed hashes
        shell: pwsh
        run: ./scripts/verify-release-integrity.ps1
      - name: Verify Paddle environment isolation and fulfillment rules
        shell: pwsh
        run: ./scripts/verify-paddle-live-preflight.ps1
